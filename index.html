<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>School Ghost</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Orbitron;
}

body{
background:linear-gradient(135deg,#050010,#0a001a);
color:white;
height:100vh;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#ff00ff22,transparent 40%);
animation:moveBg 10s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(-10%,-10%)}
50%{transform:translate(10%,10%)}
100%{transform:translate(-10%,-10%)}
}

header{
text-align:center;
padding:40px;
font-size:38px;
color:#ff00ff;
text-shadow:0 0 20px #ff00ff;
letter-spacing:4px;
}

.container{
width:900px;
margin:auto;
padding:20px;
}

.menu{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

button{
background:rgba(0,0,0,0.5);
border:2px solid #00f7ff;
color:#00f7ff;
padding:14px 28px;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
backdrop-filter:blur(10px);
}

button:hover{
background:#00f7ff;
color:black;
box-shadow:0 0 20px #00f7ff;
transform:scale(1.05);
}

.card{
background:rgba(0,0,0,0.6);
border:1px solid #ff00ff;
border-radius:20px;
padding:20px;
margin:20px 0;
box-shadow:0 0 20px #ff00ff33;
animation:fade 0.4s;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px)}
to{opacity:1; transform:translateY(0)}
}

textarea{
width:100%;
height:120px;
background:rgba(0,0,0,0.5);
border:1px solid #00f7ff;
border-radius:15px;
color:#00f7ff;
padding:12px;
margin-top:15px;
}

.hidden{
display:none;
}

h2{
color:#00f7ff;
margin-bottom:10px;
text-shadow:0 0 10px #00f7ff;
}

.requests{
margin-top:20px;
}

</style>
</head>

<body>

<header>👻 SCHOOL GHOST</header>

<div class="container">

<div id="menu" class="menu">

<button onclick="openBuy()">Создать заявку</button>
<button onclick="openSell()">Активные заявки</button>

</div>


<div id="buy" class="hidden">

<h2>Создать заявку</h2>

<textarea id="requestText" placeholder="Напиши какую помощь тебе нужно..."></textarea>

<br><br>

<button onclick="createRequest()">Отправить</button>
<button onclick="back()">Назад</button>

</div>


<div id="sell" class="hidden">

<h2>Активные заявки</h2>

<div id="requests" class="requests"></div>

<button onclick="back()">Назад</button>

</div>

</div>


<script>

let requests=[]

function openBuy(){

document.getElementById("menu").classList.add("hidden")
document.getElementById("buy").classList.remove("hidden")

}

function openSell(){

document.getElementById("menu").classList.add("hidden")
document.getElementById("sell").classList.remove("hidden")

renderRequests()

}

function back(){

document.getElementById("menu").classList.remove("hidden")
document.getElementById("buy").classList.add("hidden")
document.getElementById("sell").classList.add("hidden")

}

function createRequest(){

let text=document.getElementById("requestText").value

if(text==""){
alert("Напиши заявку")
return
}

requests.push({
text:text
})

document.getElementById("requestText").value=""

alert("Заявка создана 👻")

}

function renderRequests(){

let container=document.getElementById("requests")

container.innerHTML=""

if(requests.length==0){

container.innerHTML="<p>Пока нет заявок</p>"
return

}

requests.forEach((req,i)=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<p>${req.text}</p>

<br>

<button onclick="respond(${i})">Откликнуться</button>

`

container.appendChild(card)

})

}

function respond(i){

let text=prompt("Напиши предложение помощи")

if(!text) return

alert("Ответ отправлен 👻")

}

</script>

</body>
</html>
